networks:
  farmsense:
    driver: bridge

volumes:
  postgres_data:
  influxdb_data:
  influxdb_config:
  vault_data:
  vault_keys:       # persists unseal key + root token across restarts

services:

  # ─── Reverse Proxy ────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    networks:
      - farmsense
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/traefik.yml:/traefik.yml:ro
      - ./infra/traefik/certs:/certs
    labels:
      - "traefik.enable=true"

  # ─── Cloudflare Tunnel ────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    networks:
      - farmsense
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}

  # ─── HashiCorp Vault ──────────────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.16
    container_name: vault
    restart: unless-stopped
    networks:
      - farmsense
    ports:
      - "8200:8200"
    environment:
      - VAULT_ADDR=http://0.0.0.0:8200
      - VAULT_API_ADDR=http://vault:8200
    volumes:
      - vault_data:/vault/data
      - vault_keys:/vault/keys
      - ./infra/vault/config.hcl:/vault/config/config.hcl:ro
      - ./infra/vault/policies:/vault/policies:ro
    cap_add:
      - IPC_LOCK
    command: vault server -config=/vault/config/config.hcl
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8200/v1/sys/health?standbyok=true&uninitcode=200&sealedcode=200"]
      interval: 10s
      timeout: 5s
      retries: 10
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vault.rule=Host(`vault.${DOMAIN}`)"
      - "traefik.http.routers.vault.entrypoints=websecure"
      - "traefik.http.services.vault.loadbalancer.server.port=8200"

  # ─── Vault Auto-Unseal Sidecar ────────────────────────────────────────────
  # Watches Vault and unseals it automatically on every restart.
  # The unseal key is stored in the vault_keys volume (persists on disk).
  # Run `docker compose exec vault vault operator init` once, then
  # `./infra/vault/init.sh` to bootstrap. After that, this handles everything.
  vault-unseal:
    image: hashicorp/vault:1.16
    container_name: vault-unseal
    restart: unless-stopped
    networks:
      - farmsense
    depends_on:
      vault:
        condition: service_healthy
    environment:
      - VAULT_ADDR=http://vault:8200
    volumes:
      - vault_keys:/vault/keys:ro
      - ./infra/vault/unseal.sh:/unseal.sh:ro
    entrypoint: ["/bin/sh", "/unseal.sh"]

  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    networks:
      - farmsense
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── InfluxDB ─────────────────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7-alpine
    container_name: influxdb
    restart: unless-stopped
    networks:
      - farmsense
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_ADMIN_USER}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_ADMIN_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka (KRaft mode) ───────────────────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.9
    container_name: kafka
    restart: unless-stopped
    networks:
      - farmsense
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_CFG_NUM_PARTITIONS=3
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Kafka UI ─────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    networks:
      - farmsense
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_CLUSTERS_0_NAME=farmsense
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kafka-ui.rule=Host(`kafka.${DOMAIN}`)"
      - "traefik.http.routers.kafka-ui.entrypoints=websecure"
      - "traefik.http.services.kafka-ui.loadbalancer.server.port=8080"

  # ─── Go API ───────────────────────────────────────────────────────────────
  # All secrets fetched from Vault at startup via AppRole — not from env vars.
  api:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    container_name: api
    restart: unless-stopped
    networks:
      - farmsense
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      vault-unseal:
        condition: service_started
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_ROLE_ID=${VAULT_API_ROLE_ID}
      - VAULT_SECRET_ID=${VAULT_API_SECRET_ID}
      - KAFKA_BROKERS=kafka:9092
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.services.api.loadbalancer.server.port=8080"

  # ─── Go Kafka Consumer ────────────────────────────────────────────────────
  consumer:
    build:
      context: ./backend/consumer
      dockerfile: Dockerfile
    container_name: consumer
    restart: unless-stopped
    networks:
      - farmsense
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      vault-unseal:
        condition: service_started
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_ROLE_ID=${VAULT_CONSUMER_ROLE_ID}
      - VAULT_SECRET_ID=${VAULT_CONSUMER_SECRET_ID}
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=${KAFKA_SENSOR_TOPIC}
      - KAFKA_GROUP_ID=farmsense-consumer
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}

  # ─── React Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    networks:
      - farmsense
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
